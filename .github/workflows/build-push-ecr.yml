# Build the debate-analyzer Docker images and push to Amazon ECR.
# Builds only the image(s) whose paths changed (push); workflow_dispatch builds all.
# - Pipeline image (Batch): Dockerfile -> debate-analyzer
# - Web app image (Fargate): Dockerfile.webapp -> debate-analyzer-webapp
# - LLM image (Batch, Ollama): Dockerfile.llm.ollama -> debate-analyzer-llm:latest-ollama
# For OIDC: set up an IAM role with trust for token.actions.githubusercontent.com
#   and permissions for ECR GetAuthorizationToken, ECR PutImage, InitiateLayerUpload, UploadLayerPart, CompleteLayerUpload
#   on ALL THREE ECR repositories (debate-analyzer, debate-analyzer-webapp, debate-analyzer-llm).
# Then set AWS_REGION and AWS_ROLE_ARN (or use repo secrets).

name: Build and push to ECR

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'pyproject.toml'
      - 'poetry.lock'
      - 'Dockerfile'
      - 'Dockerfile.webapp'
      - 'Dockerfile.llm.ollama'
      - 'frontend/**'
      - 'deploy/scripts/entrypoints/**'
  workflow_dispatch:

env:
  ECR_REPOSITORY: debate-analyzer
  ECR_REPOSITORY_WEBAPP: debate-analyzer-webapp
  ECR_REPOSITORY_LLM: debate-analyzer-llm
  IMAGE_TAG: latest

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set build-all flag (workflow_dispatch builds all images)
        id: buildall
        run: echo "build_all=${{ github.event_name == 'workflow_dispatch' }}" >> "$GITHUB_OUTPUT"

      - name: Paths filter (which image(s) to build)
        id: filters
        uses: dorny/paths-filter@v3
        with:
          filters: |
            pipeline:
              - 'Dockerfile'
              - 'pyproject.toml'
              - 'poetry.lock'
              - 'deploy/scripts/entrypoints/entrypoint.sh'
              - 'deploy/scripts/entrypoints/entrypoint_download.sh'
              - 'deploy/scripts/entrypoints/entrypoint_transcribe.sh'
              - 'deploy/scripts/entrypoints/entrypoint_stats.sh'
              - 'src/debate_analyzer/transcriber/**'
              - 'src/debate_analyzer/video_downloader/**'
              - 'src/debate_analyzer/batch/stats_job.py'
              - 'src/debate_analyzer/api/**'
              - 'src/debate_analyzer/db/**'
              - 'src/debate_analyzer/__init__.py'
            webapp:
              - 'Dockerfile.webapp'
              - 'frontend/**'
              - 'src/debate_analyzer/api/**'
              - 'src/debate_analyzer/db/**'
            llm:
              - 'Dockerfile.llm.ollama'
              - 'deploy/scripts/entrypoints/entrypoint_llm_ollama.sh'
              - 'src/debate_analyzer/analysis/**'
              - 'src/debate_analyzer/batch/llm_analysis_job.py'
              - 'src/debate_analyzer/api/loader.py'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'eu-central-1' }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push pipeline image (with layer cache)
        if: steps.buildall.outputs.build_all == 'true' || steps.filters.outputs.pipeline == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          cache-from: type=registry,ref=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:buildcache
          cache-to: type=registry,ref=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:buildcache,mode=max

      - name: Build and push web app image (Fargate)
        if: steps.buildall.outputs.build_all == 'true' || steps.filters.outputs.webapp == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.webapp
          push: true
          tags: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_WEBAPP }}:${{ env.IMAGE_TAG }}
          cache-from: type=registry,ref=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_WEBAPP }}:buildcache
          cache-to: type=registry,ref=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_WEBAPP }}:buildcache,mode=max

      - name: Build and push LLM Ollama image
        if: steps.buildall.outputs.build_all == 'true' || steps.filters.outputs.llm == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.llm.ollama
          push: true
          tags: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_LLM }}:latest-ollama
          cache-from: type=registry,ref=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_LLM }}:buildcache-ollama
          cache-to: type=registry,ref=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_LLM }}:buildcache-ollama,mode=max
